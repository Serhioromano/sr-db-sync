strictModeWhiteList:
  - ^ls\b
  - ^git\b
  - ^cat\b
  - ^echo\b
  - ^cd\b
  - ^mkdir\b
  - ^bun install\b
  - ^bun run(\s+--?[a-zA-Z][\w-]*)*\s+src/index\.ts\b
  - ^bun run(\s+--?[a-zA-Z][\w-]*)*\s+typecheck\b
  - ^npx fallow\b
  - ^find\b
  - ^npx tsc\b
  - ^bun add\b
  - ^bun test\b
  - ^grep\b
  - ^true\b
  - ^docker ps\b
  - ^docker run\b
  - ^which\b
  - ^docker --version\b
  - ^npm pack\b
  - ^node\b
  - ^make compile\b
  - ^npm view\b
  - ^gh\b
